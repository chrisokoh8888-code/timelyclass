<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Auto Timetable Generator</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #333; padding: 8px; text-align: center; }
th { background-color: #4CAF50; color: white; }
td.subject { color: white; font-weight: bold; }
.controls { margin-bottom: 10px; }
button { margin-right: 10px; padding: 10px 15px; }
</style>
</head>
<body>

<h2>Elite Auto Timetable Generator</h2>

<div class="controls">
  <button onclick="generateTimetable()">Generate Timetable</button>
  <button onclick="downloadPDF()">Export PDF</button>
  <button onclick="downloadExcel()">Export Excel</button>
</div>

<table id="timetable">
<thead>
<tr>
<th>Time</th>
<th>Monday</th>
<th>Tuesday</th>
<th>Wednesday</th>
<th>Thursday</th>
<th>Friday</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
// ===== PARAMETERS =====
const school = {
days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
startTime: "08:00",
endTime: "15:00",
periodMinutes: 60,
breaks: [
{ start: "10:30", end: "10:45" },
{ start: "12:30", end: "13:00" }
],
practicalStartTime: "13:00"
};

const classes = [
{ name: "Mathematics", grade: "JSS1", sessionsPerWeek: 5, type:"Theory", color: "#1f77b4" },
{ name: "English", grade: "JSS1", sessionsPerWeek: 5, type:"Theory", color: "#ff7f0e" },
{ name: "Physics", grade: "JSS1", sessionsPerWeek: 3, type:"Practical", color: "#2ca02c" },
{ name: "Chemistry", grade: "JSS1", sessionsPerWeek: 3, type:"Practical", color: "#d62728" },
];

const teachers = [
{ name: "Mr. John", subjects: ["Mathematics"], maxPerDay: 2 },
{ name: "Mrs. Ada", subjects: ["English"], maxPerDay: 2 },
{ name: "Dr. Mike", subjects: ["Physics", "Chemistry"], maxPerDay: 2 }
];

const rooms = ["Room 101", "Room 102", "Lab 1", "Lab 2"];

// ===== HELPER FUNCTIONS =====
function generateTimeSlots(startTime, endTime, periodMinutes){
const slots = [];
let [hours, minutes] = startTime.split(":").map(Number);
const [endHours, endMinutes] = endTime.split(":").map(Number);
while(hours < endHours || (hours===endHours && minutes<endMinutes)){
let start = `${hours.toString().padStart(2,"0")}:${minutes.toString().padStart(2,"0")}`;
minutes+=periodMinutes;
if(minutes>=60){ hours+=1; minutes-=60; }
let end = `${hours.toString().padStart(2,"0")}:${minutes.toString().padStart(2,"0")}`;
if(hours>endHours || (hours===endHours && minutes>endMinutes)) break;
const isBreak = school.breaks.some(b=>start>=b.start && start<b.end);
if(!isBreak) slots.push({start,end});
}
return slots;
}

function shuffleArray(arr){ return arr.sort(()=>Math.random()-0.5); }

// ===== TIMETABLE GENERATOR =====
function generateTimetable(){
const tbody = document.querySelector("#timetable tbody");
tbody.innerHTML="";
const slots = generateTimeSlots(school.startTime, school.endTime, school.periodMinutes);
const timetable = {};
school.days.forEach(day=>timetable[day] = Array(slots.length).fill(null));

// Track teacher and room usage
const teacherLoad = {};
teachers.forEach(t=>teacherLoad[t.name] = { perDay:{}, total:0 });
const roomLoad = {};
rooms.forEach(r=>roomLoad[r]={ perDay:{} });

classes.forEach(cls=>{
let sessionsLeft = cls.sessionsPerWeek;
while(sessionsLeft>0){
const sortedDays = school.days.sort((a,b)=>{
const countA = timetable[a].filter(x=>x?.text?.startsWith(cls.name)).length;
const countB = timetable[b].filter(x=>x?.text?.startsWith(cls.name)).length;
return countA-countB;
});
for(let day of sortedDays){
for(let slotIndex=0; slotIndex<slots.length; slotIndex++){
const slotTime = slots[slotIndex].start;
if(!timetable[day][slotIndex]){
// Practical after practicalStartTime
if(cls.type==="Practical" && slotTime<school.practicalStartTime) continue;
// No consecutive same subject
if(slotIndex>0 && timetable[day][slotIndex-1]?.text?.startsWith(cls.name)) continue;
// Find available teacher
const availableTeachers = teachers.filter(t=>t.subjects.includes(cls.name));
let assigned=false;
for(let teacher of shuffleArray(availableTeachers)){
const perDay = teacherLoad[teacher.name].perDay[day] || [];
const backToBack = perDay.includes(slotIndex-1) || perDay.includes(slotIndex+1);
if(perDay.length<teacher.maxPerDay && !backToBack){
const room = rooms.find(r=>{
const roomPerDay = roomLoad[r].perDay[day]||[];
return !roomPerDay.includes(slotIndex);
});
if(room){
timetable[day][slotIndex]={text:`${cls.name} (${teacher.name}, ${room})`, color:cls.color, teacher:teacher.name, room:room};
teacherLoad[teacher.name].perDay[day] = [...perDay, slotIndex];
teacherLoad[teacher.name].total+=1;
roomLoad[room].perDay[day]=[...(roomLoad[room].perDay[day]||[]), slotIndex];
sessionsLeft--;
assigned=true;
break;
}
}
}
if(assigned) break;
}
if(sessionsLeft<=0) break;
}
if(sessionsLeft<=0) break;
}
});

// Render table
for(let i=0;i<slots.length;i++){
const tr=document.createElement("tr");
const timeCell=document.createElement("td");
timeCell.textContent=`${slots[i].start} - ${slots[i].end}`;
tr.appendChild(timeCell);
school.days.forEach(day=>{
const td=document.createElement("td");
const entry=timetable[day][i];
if(entry){
td.textContent=entry.text;
td.style.backgroundColor=entry.color;
td.classList.add("subject");
}
tr.appendChild(td);
});
tbody.appendChild(tr);
}
}

// ===== EXPORT PDF =====
function downloadPDF(){
const element = document.getElementById('timetable');
html2pdf().from(element).save('Timetable.pdf');
}

// ===== EXPORT EXCEL =====
function downloadExcel(){
const table = document.getElementById("timetable");
const wb = XLSX.utils.table_to_book(table,{sheet:"Timetable"});
XLSX.writeFile(wb,"Timetable.xlsx");
}
</script>
</body>
</html>
