<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Timetable Generator</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{max-width:1200px;margin:0 auto;padding:1.25rem 1rem;font-family:Arial, sans-serif;color:#111}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:1.25rem}
.tabs{display:flex;gap:0;border-bottom:1px solid #ddd;margin-bottom:1.25rem;overflow-x:auto}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#111;border-bottom-color:#111;font-weight:500}
.panel{display:none}.panel.active{display:block}

.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:1.25rem;margin-bottom:1rem}
.sec{font-size:14px;font-weight:500;margin-bottom:.875rem}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px}

.fg{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;color:#666}

input,select{
  height:34px;
  padding:0 9px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:13px;
  background:#fff;
  width:100%;
}

.btn{
  height:34px;
  padding:0 14px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
  background:#fff;
}

.btn-p{background:#111;color:#fff}
.btn-d{color:red;border-color:red}

.ilist{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.irow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:7px 10px;
  background:#f5f5f5;
  border-radius:6px;
  font-size:12px;
}

/* TIMETABLE */
.tt-wrap{overflow-x:auto}
table.tt{border-collapse:collapse;width:100%}
table.tt th,table.tt td{
  border:1px solid #ddd;
  font-size:11px;
  text-align:center;
}
table.tt th{
  background:#f5f5f5;
  padding:5px 6px;
}
table.tt td{
  background:#fff;
  cursor:pointer;
  height:50px;
}

/* EMPTY */
.empty{
  text-align:center;
  padding:2rem 1rem;
  color:#666;
  font-size:13px;
}

/* MODAL */
.modal-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  z-index:200;
  align-items:center;
  justify-content:center;
}
.modal-bg.open{display:flex}

.modal{
  background:#fff;
  border-radius:8px;
  padding:1.25rem;
  width:360px;
  max-width:90vw;
  border:1px solid #ccc;
}

.modal h3{
  font-size:15px;
  margin-bottom:.875rem;
}

.modal-btns{
  display:flex;
  gap:7px;
  justify-content:flex-end;
  margin-top:.875rem;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:9px 18px;
  border-radius:6px;
  font-size:13px;
  z-index:999;
  opacity:0;
  transition:.2s;
}
.toast.show{opacity:1}

/* RESPONSIVE */
@media(max-width:640px){
  .row2,.row3,.row4{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="app">
<h1>School Timetable Generator</h1>
<p class="subtitle">Configure subjects, teachers, breaks and availability — then auto-generate and export schedules.</p>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="showTab('setup')">Setup</button>
  <button class="tab" onclick="showTab('breaks')">Breaks</button>
  <button class="tab" onclick="showTab('avail')">Availability</button>
  <button class="tab" onclick="showTab('timetable')">Timetable</button>
  <button class="tab" onclick="showTab('conflicts')">Conflicts</button>
</div>

<!-- SETUP -->
<div id="tab-setup" class="panel active">

  <div class="card">
    <div class="sec">School Settings</div>
    <div class="row3">
      <select id="level">
        <option value="primary">Primary</option>
        <option value="secondary" selected>Secondary</option>
      </select>
      <select id="ppd">
        <option>5</option><option>6</option><option selected>7</option>
      </select>
      <select id="sdays">
        <option value="5">Mon–Fri</option>
        <option value="6">Mon–Sat</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="sec">Subjects</div>
    <div class="row4">
      <input type="text" id="sname" placeholder="Subject">
      <input type="number" id="sper" value="5">
      <select id="scol">
        <option value="blue">Blue</option>
        <option value="teal">Teal</option>
        <option value="purple">Purple</option>
      </select>
      <button class="btn btn-p" onclick="addSubject()">Add</button>
    </div>
    <div class="ilist" id="sublist"></div>
  </div>

  <div class="card">
    <div class="sec">Teachers</div>
    <div class="row4">
      <input type="text" id="tname" placeholder="Teacher name">
      <select id="tsubj"></select>
      <input type="text" id="troom" placeholder="Room">
      <button class="btn btn-p" onclick="addTeacher()">Add</button>
    </div>
    <div class="ilist" id="tealist"></div>
  </div>

  <div class="card">
    <div class="sec">Classes</div>
    <div class="row3">
      <input type="text" id="cname" placeholder="Class name">
      <input type="number" id="csize" value="30">
      <button class="btn btn-p" onclick="addClass()">Add</button>
    </div>
    <div class="ilist" id="classlist"></div>
  </div>

</div>

<!-- BREAKS -->
<div id="tab-breaks" class="panel">
  <div class="card">
    <div class="sec">Breaks</div>
    <div id="break-cfg"></div>
  </div>
</div>

<!-- AVAILABILITY -->
<div id="tab-avail" class="panel">
  <div class="card">
    <div class="sec">Teacher Availability</div>
    <select id="avail-tea"></select>
    <div id="avail-area"></div>
  </div>
</div>

<!-- TIMETABLE -->
<div id="tab-timetable" class="panel">
  <div class="card">
    <button class="btn btn-p" onclick="generateAll()">Auto Generate</button>
    <div id="tt-area">
      <div class="empty">Add data and generate timetable</div>
    </div>
  </div>
</div>

<!-- CONFLICTS -->
<div id="tab-conflicts" class="panel">
  <div class="card">
    <div id="conflict-area"></div>
  </div>
</div>

</div>

<!-- MODAL -->
<div class="modal-bg" id="slot-modal">
  <div class="modal">
    <h3>Edit Slot</h3>
    <select id="m-sub"></select>
    <select id="m-tea"></select>
    <input type="text" id="m-room">
    <div class="modal-btns">
      <button class="btn btn-d" onclick="clearSlot()">Clear</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="saveSlot()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// ===== CONSTANTS =====
const D5=['Monday','Tuesday','Wednesday','Thursday','Friday'];
const D6=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DS5=['Mon','Tue','Wed','Thu','Fri'];
const DS6=['Mon','Tue','Wed','Thu','Fri','Sat'];

const COLS={
blue:{bg:'#E6F1FB',tx:'#0C447C'},
teal:{bg:'#E1F5EE',tx:'#085041'},
purple:{bg:'#EEEDFE',tx:'#3C3489'},
amber:{bg:'#FAEEDA',tx:'#633806'},
coral:{bg:'#FAECE7',tx:'#712B13'}
};

const BC={
blue:'b-blue',
teal:'b-teal',
purple:'b-purple',
amber:'b-amber',
coral:'b-coral'
};

// ===== GLOBAL STATE =====
let subjects=[];
let teachers=[];
let classes=[];
let timetables={};
let breaks={};
let availability={};
let editSlot=null;

// ===== SETTINGS HELPERS =====
const gD=()=>parseInt(document.getElementById('sdays').value)||5;
const gP=()=>parseInt(document.getElementById('ppd').value)||7;
const gDN=()=>gD()===6?D6:D5;
const gDS=()=>gD()===6?DS6:DS5;

function pad(n){return n.toString().padStart(2,'0')}

// ===== PERIOD LABELS =====
function getPLabels(){
  const start='08:00'.split(':').map(Number);
  const dur=45;
  const lbs=[];
  let m=start[0]*60+start[1];

  for(let i=0;i<gP();i++){
    const h1=Math.floor(m/60);
    const m1=m%60;
    const h2=Math.floor((m+dur)/60);
    const m2=(m+dur)%60;

    lbs.push(`P${i+1} ${pad(h1)}:${pad(m1)}–${pad(h2)}:${pad(m2)}`);
    m+=dur;
  }
  return lbs;
}

// ===== TAB SYSTEM =====
function showTab(t){
  ['setup','breaks','avail','timetable','conflicts'].forEach((id,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',id===t);
    document.getElementById('tab-'+id).classList.toggle('active',id===t);
  });
}

// =====================
// SUBJECTS
// =====================
function addSubject(){
  const n=document.getElementById('sname').value.trim();
  if(!n)return toast('Enter subject name');

  subjects.push({
    id:Date.now(),
    name:n,
    periods:parseInt(document.getElementById('sper').value)||5,
    color:document.getElementById('scol').value
  });

  document.getElementById('sname').value='';
  renderSubjects();
  syncSubjSels();
}

function removeSubject(id){
  subjects=subjects.filter(s=>s.id!==id);
  renderSubjects();
  syncSubjSels();
}

function renderSubjects(){
  const el=document.getElementById('sublist');

  el.innerHTML=subjects.length
    ? subjects.map(s=>`
      <div class="irow">
        <span>${s.name} (${s.periods}/wk)</span>
        <button class="btn btn-d" onclick="removeSubject(${s.id})">Remove</button>
      </div>
    `).join('')
    : '<div class="empty">No subjects yet</div>';
}

function syncSubjSels(){
  const opts='<option value="">Select</option>'+
    subjects.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');

  document.getElementById('tsubj').innerHTML=opts;

  const ms=document.getElementById('m-sub');
  if(ms){
    ms.innerHTML='<option value="">Free</option>'+subjects.map(s=>`
      <option value="${s.id}">${s.name}</option>`).join('');
  }
}

// =====================
// TEACHERS
// =====================
function addTeacher(){
  const n=document.getElementById('tname').value.trim();
  const sid=parseInt(document.getElementById('tsubj').value);

  if(!n)return toast('Enter teacher name');
  if(!sid)return toast('Select subject');

  teachers.push({
    id:Date.now(),
    name:n,
    subjectId:sid,
    room:document.getElementById('troom').value.trim()
  });

  document.getElementById('tname').value='';
  document.getElementById('troom').value='';

  renderTeachers();
}

function removeTeacher(id){
  teachers=teachers.filter(t=>t.id!==id);
  delete availability[id];
  renderTeachers();
}

function renderTeachers(){
  const el=document.getElementById('tealist');

  el.innerHTML=teachers.length
    ? teachers.map(t=>{
        const sub=subjects.find(s=>s.id===t.subjectId);
        return `
        <div class="irow">
          <span>${t.name} (${sub?sub.name:''})</span>
          <button class="btn btn-d" onclick="removeTeacher(${t.id})">Remove</button>
        </div>`;
      }).join('')
    : '<div class="empty">No teachers yet</div>';
}

// =====================
// CLASSES
// =====================
function addClass(){
  const n=document.getElementById('cname').value.trim();

  if(!n)return toast('Enter class name');

  const cls={
    id:Date.now(),
    name:n,
    size:parseInt(document.getElementById('csize').value)||30
  };

  classes.push(cls);
  timetables[cls.id]=mkTT();

  document.getElementById('cname').value='';

  renderClasses();
}

function removeClass(id){
  classes=classes.filter(c=>c.id!==id);
  delete timetables[id];
  renderClasses();
}

function renderClasses(){
  const el=document.getElementById('classlist');

  el.innerHTML=classes.length
    ? classes.map(c=>`
      <div class="irow">
        <span>${c.name} (${c.size})</span>
        <button class="btn btn-d" onclick="removeClass(${c.id})">Remove</button>
      </div>
    `).join('')
    : '<div class="empty">No classes yet</div>';
}

// ===== TIMETABLE STRUCTURE =====
function mkTT(){
  const tt=[];
  for(let d=0;d<6;d++){
    tt.push([]);
    for(let p=0;p<8;p++)tt[d].push(null);
  }
  return tt;
}

// ===== TOAST =====
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

// =====================
// BREAK SYSTEM
// =====================
function renderBreakCfg(){
  const lbs=getPLabels();

  document.getElementById('break-cfg').innerHTML=
    Array.from({length:gP()},(_,i)=>{
      const k=`p${i}`;
      const v=breaks[k]||'';

      return `
      <div class="irow">
        <span>${lbs[i]}</span>
        <select onchange="setBreak(${i},this.value)">
          <option value="" ${!v?'selected':''}>Lesson</option>
          <option value="break" ${v==='break'?'selected':''}>Break</option>
          <option value="lunch" ${v==='lunch'?'selected':''}>Lunch</option>
        </select>
      </div>`;
    }).join('');
}

function setBreak(p,v){
  if(v)breaks[`p${p}`]=v;
  else delete breaks[`p${p}`];
}

// =====================
// AVAILABILITY SYSTEM
// =====================
function renderAvail(){
  const tid=parseInt(document.getElementById('avail-tea').value);
  const area=document.getElementById('avail-area');

  if(!tid){
    area.innerHTML='<div class="empty">Select teacher</div>';
    return;
  }

  if(!availability[tid])availability[tid]={};

  const d=gD(),p=gP(),dns=gDS(),lbs=getPLabels();

  let html='<table class="tt"><tr><th></th>';

  dns.forEach(day=>{
    html+=`<th>${day}</th>`;
  });

  html+='</tr>';

  for(let pi=0;pi<p;pi++){
    if(breaks[`p${pi}`])continue;

    html+=`<tr><td>${lbs[pi]}</td>`;

    for(let di=0;di<d;di++){
      const key=`${di}-${pi}`;
      const blocked=availability[tid][key];

      html+=`
      <td onclick="toggleAvail(${tid},'${key}')"
          style="background:${blocked?'#FCEBEB':'#E8F5E9'};cursor:pointer">
          ${blocked?'✕':'✓'}
      </td>`;
    }

    html+='</tr>';
  }

  html+='</table>';
  area.innerHTML=html;
}

function toggleAvail(tid,key){
  if(!availability[tid])availability[tid]={};

  if(availability[tid][key]){
    delete availability[tid][key];
  } else {
    availability[tid][key]=true;
  }

  renderAvail();
}

// =====================
// AUTO GENERATION ENGINE
// =====================
function generateAll(){

  if(!subjects.length)return toast('Add subjects first');
  if(!teachers.length)return toast('Add teachers first');
  if(!classes.length)return toast('Add classes first');

  const d=gD();
  const p=gP();

  classes.forEach(cls=>{

    const tt=mkTT();

    // AVAILABLE SLOTS
    const slots=[];
    for(let di=0;di<d;di++){
      for(let pi=0;pi<p;pi++){
        if(!breaks[`p${pi}`]){
          slots.push({di,pi});
        }
      }
    }

    // REQUIRED SUBJECT SLOTS
    const needed=[];

    subjects.forEach(s=>{
      const tea=teachers.filter(t=>t.subjectId===s.id);

      if(!tea.length)return;

      for(let i=0;i<s.periods;i++){
        needed.push({
          subjectId:s.id,
          teacherId:tea[i % tea.length].id
        });
      }
    });

    shuffle(needed);

    let ni=0;

    for(const {di,pi} of slots){

      if(ni>=needed.length)break;

      const item=needed[ni];

      // CHECK AVAILABILITY
      if(!(availability[item.teacherId] &&
           availability[item.teacherId][`${di}-${pi}`])){

        tt[di][pi]=item;
        ni++;
      }
    }

    timetables[cls.id]=tt;
  });

  toast('Timetable generated!');
}

// =====================
// SHUFFLE
// =====================
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}


</body>
</html>
